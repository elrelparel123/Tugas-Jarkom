<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>

    <section class="login d-flex justify-content-center align-items-center">
      <div class="login-container container-fluid shadow rounded-4 overflow-hidden">
        <div class="row g-0 flex-wrap">
          
          <!-- Login kiri -->
          <div class="login-left col-12 col-md-6 d-flex justify-content-center align-items-center p-4">
            <div class="w-100">
              <div class="header mb-3 text-center text-md-start">  
                <h1>Halo Selamat Datang</h1>
                <p>Sebelum order harap login ke akun anda terlebih dahulu</p>
              </div>

              <div class="login-form">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Masukkan Email">
                <label for="Password" class="form-label">Password</label>
                <input type="Password" class="form-control" id="Password" placeholder="Masukkan Password">
                <a href="#" class="text-decoration-none text-center d-block mt-2">Forgot Password</a>
                <button class="sign-in mt-3">Sign In</button>
                <button class="signin-google mt-2">
                  Sign In With Google
                  <img src="img/icon google.png" alt="Google Icon">
                </button>
                <div class="text-center mt-3">
                  <span>Don't have an account? <a href="#" class="text-decoration-none">Sign up for free</a></span>
                </div>
              </div>
            </div>
          </div>

          <!-- Login kanan -->
          <div class="login-right col-12 col-md-6 p-0">
           <div id="carouselExampleCaptions" class="carousel slide h-100" data-bs-ride="carousel">
              <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true"></button>
                <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1"></button>
              </div>
              <div class="carousel-inner h-100">
                <div class="carousel-item active h-100">
                  <img src="img/WhatsApp Image 2025-08-26 at 18.10.39.jpeg" class="d-block w-100 h-100" alt="">
                </div>
                <div class="carousel-item h-100">
                  <img src="img/WhatsApp Image 2025-08-31 at 17.59.39.jpeg" class="d-block w-100 h-100" alt="">
                </div>
              </div>
              <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
              </button>
            </div>
          </div>

        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
